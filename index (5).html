  <title>InstituteTracker</title>

  <meta name="apple-mobile-web-app-capable" content="yes" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #0ec0e2;
      --brand-dark: #0aa8c8;
      --white: #ffffff;
      --text: #1a2332;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--white);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Splash ── */
    #splash {
      position: fixed;
      inset: 0;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      z-index: 999;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.03);
    }

    .splash-logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      animation: fadeUp 0.6s ease both;
    }
    .splash-logo-wrap img { width: 190px; height: auto; }
    .splash-divider { width: 36px; height: 3px; background: var(--brand); border-radius: 99px; }
    .splash-title { color: var(--brand); font-size: 21px; font-weight: 700; letter-spacing: 0.4px; }
    .splash-sub {
      color: #bbb;
      font-size: 11.5px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: -14px;
    }

    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.6s 0.2s ease both;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e8f9fd;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #ccc; font-size: 12px; }

    /* ── App iframe ── */
    #app-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Error state ── */
    #error-state {
      display: none;
      position: fixed;
      inset: 0;
      background: #f7feff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 32px;
      text-align: center;
    }
    #error-state.visible { display: flex; }
    #error-state img { width: 150px; margin-bottom: 8px; opacity: 0.8; }
    #error-state h2 { color: var(--text); font-size: 18px; }
    #error-state p { color: #888; font-size: 13px; line-height: 1.7; max-width: 300px; }
    .btn-retry {
      background: var(--brand);
      color: white;
      border: none;
      padding: 11px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-retry:hover { background: var(--brand-dark); }

    /* ── Install banner ── */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a2332;
      color: white;
      padding: 14px 20px;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      gap: 14px;
      align-items: center;
      z-index: 1001;
      max-width: 90vw;
      width: 380px;
    }
    #install-banner.visible { display: flex; }
    #install-banner span { flex: 1; line-height: 1.5; font-size: 13px; }
    #install-banner strong { color: var(--brand); }
    .btn-install {
      background: var(--brand);
      color: white;
      border: none;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-install:hover { background: var(--brand-dark); }
    .btn-dismiss {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
    }
    .btn-dismiss:hover { color: white; }
  </style>
</head>

  <!-- Install banner -->
  <div id="install-banner">
    <span>📲 Add <strong>InstituteTracker</strong> to your home screen</span>
    <button class="btn-install" id="btn-install">Install</button>
    <button class="btn-dismiss" id="btn-dismiss">×</button>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    const splash   = document.getElementById('splash');
    const frame    = document.getElementById('app-frame');
    const errorEl  = document.getElementById('error-state');

    let loadTimeout = setTimeout(() => {
      splash.classList.add('hidden');
      errorEl.classList.add('visible');
    }, 15000);

    frame.addEventListener('load', () => {
      clearTimeout(loadTimeout);
      setTimeout(() => splash.classList.add('hidden'), 900);
    });

    frame.addEventListener('error', () => {
      clearTimeout(loadTimeout);
      splash.classList.add('hidden');
      errorEl.classList.add('visible');
    });

    function retryLoad() {
      errorEl.classList.remove('visible');
      splash.classList.remove('hidden');
      frame.src = frame.src;
      loadTimeout = setTimeout(() => {
        splash.classList.add('hidden');
        errorEl.classList.add('visible');
      }, 15000);
    }

    // PWA install
    let deferredPrompt = null;
    const installBanner = document.getElementById('install-banner');
    const btnInstall    = document.getElementById('btn-install');
    const btnDismiss    = document.getElementById('btn-dismiss');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      setTimeout(() => installBanner.classList.add('visible'), 3500);
    });

    btnInstall.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBanner.classList.remove('visible');
    });

    btnDismiss.addEventListener('click', () => {
      installBanner.classList.remove('visible');
      deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => installBanner.classList.remove('visible'));
  </script>
